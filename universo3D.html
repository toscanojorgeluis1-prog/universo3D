<!DOCTYPE html>
<html>
<head>
<title>Nuestro Universo</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

#panel{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.85);
color:white;
padding:20px;
border-radius:15px;
display:none;
max-width:400px;
text-align:center;
}

#panel img{
width:100%;
border-radius:10px;
margin-top:10px;
}

</style>
</head>

<body>

<div id="panel">
<h2 id="title"></h2>
<p id="text"></p>
<img id="photo">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer = new THREE.WebGLRenderer()

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

camera.position.z=12

// estrellas

const starGeometry=new THREE.BufferGeometry()

const starVertices=[]

for(let i=0;i<5000;i++){

const x=(Math.random()-0.5)*2000
const y=(Math.random()-0.5)*2000
const z=(Math.random()-0.5)*2000

starVertices.push(x,y,z)

}

starGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(starVertices,3)
)

const starMaterial=new THREE.PointsMaterial({color:0xffffff})

const stars=new THREE.Points(starGeometry,starMaterial)

scene.add(stars)

// luz

const light=new THREE.PointLight(0xffffff,2)

scene.add(light)

// sol

const sunGeometry=new THREE.SphereGeometry(1.5,32,32)

const sunMaterial=new THREE.MeshBasicMaterial({color:0xffaa00})

const sun=new THREE.Mesh(sunGeometry,sunMaterial)

scene.add(sun)

// planetas

function createPlanet(size,distance,color){

const geometry=new THREE.SphereGeometry(size,32,32)

const material=new THREE.MeshStandardMaterial({color:color})

const planet=new THREE.Mesh(geometry,material)

planet.userData={distance:distance,angle:Math.random()*Math.PI*2}

scene.add(planet)

return planet

}

const planet1=createPlanet(0.4,3,0x8844ff)
const planet2=createPlanet(0.5,5,0x44ff88)
const planet3=createPlanet(0.6,7,0xff4488)

const planets=[planet1,planet2,planet3]

function animate(){

requestAnimationFrame(animate)

planets.forEach(p=>{

p.userData.angle+=0.01

p.position.x=Math.cos(p.userData.angle)*p.userData.distance
p.position.z=Math.sin(p.userData.angle)*p.userData.distance

})

renderer.render(scene,camera)

}

animate()

// click

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

window.addEventListener('click',event=>{

mouse.x=(event.clientX/window.innerWidth)*2-1
mouse.y=-(event.clientY/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const intersects=raycaster.intersectObjects(planets)

if(intersects.length>0){

let planet=intersects[0].object

let title=""
let text=""

if(planet===planet1){
title="Nuestro primer beso"
text="Aquí comenzó nuestro pequeño universo."
}

if(planet===planet2){
title="Nuestra primera cita"
text="El día que supe que quería más momentos contigo."
}

if(planet===planet3){
title="Cuando entendí que te amaba"
text="Aquí nació algo que nunca quiero perder."
}

document.getElementById("panel").style.display="block"

document.getElementById("title").innerText=title
document.getElementById("text").innerText=text

}

})

</script>

</body>
</html>
