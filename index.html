<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>El Universo de Ale - Profesional</title>
<style>
body {
  margin:0;
  overflow:hidden;
  background:black;
  font-family: Arial, sans-serif;
}

#panel {
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.85);
  color:white;
  padding:20px;
  border-radius:15px;
  display:none;
  max-width:420px;
  text-align:center;
}

#homeBtn {
  position:absolute;
  top:20px;
  left:20px;
  padding:10px 15px;
  background:rgba(0,0,0,0.8);
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  display:none;
}
</style>
</head>
<body>

<button id="homeBtn">Volver al inicio</button>
<div id="panel">
  <h2 id="title"></h2>
  <p id="text"></p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// =====================
// ESCENA, CÁMARA Y RENDER
// =====================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 3000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

camera.position.set(0, 20, 50);
const homePosition = camera.position.clone();
let targetPlanet = null;

// =====================
// LUCES
// =====================
const sunLight = new THREE.PointLight(0xffffff, 4);
sunLight.position.set(0,50,30);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

// =====================
// ESTRELLAS DINÁMICAS
// =====================
const starGeo = new THREE.BufferGeometry();
const starVertices = [];
for(let i=0;i<60000;i++){
  starVertices.push(
    (Math.random()-0.5)*3000,
    (Math.random()-0.5)*3000,
    (Math.random()-0.5)*3000
  );
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices,3));
const starMaterial = new THREE.PointsMaterial({color:0xffffff, size:1.2, transparent:true});
const stars = new THREE.Points(starGeo, starMaterial);
scene.add(stars);

// =====================
// PLANETAS Y ATMÓSFERA
// =====================
function createPlanet(size, distance, color, title, text){
  const geometry = new THREE.SphereGeometry(size,64,64);
  const material = new THREE.MeshPhongMaterial({color, shininess:50, specular:0xaaaaaa});
  const planet = new THREE.Mesh(geometry, material);
  planet.userData = {distance, angle:Math.random()*Math.PI*2, title, text};
  scene.add(planet);

  // Atmósfera brillante
  const glowGeo = new THREE.SphereGeometry(size*1.08,64,64);
  const glowMat = new THREE.MeshBasicMaterial({color:0x66ccff, transparent:true, opacity:0.25});
  const glow = new THREE.Mesh(glowGeo, glowMat);
  planet.add(glow);

  return planet;
}

// =====================
// DEFINICIÓN DE PLANETAS
// =====================
const planets = [
  createPlanet(1.6,10,0xff6699,"Nuestro primer beso","El momento donde empezó nuestro universo."),
  createPlanet(1.8,16,0x3399ff,"Citas en el parque","Las tardes contigo en el parque siempre son especiales."),
  createPlanet(1.5,22,0xff9933,"Tus bromas apestosas","Aunque a veces son terribles, siempre terminan haciéndome reír."),
  createPlanet(2.0,28,0x66ffcc,"Nuestras llamadas","Cada llamada contigo me recuerda cuánto significas para mí."),
  createPlanet(1.7,34,0xcc66ff,"Nuestras historias","Cada historia contigo es una página más de nuestra aventura."),
  createPlanet(2.3,40,0x6699ff,"Nosotros","Tú y yo, siendo nosotros mismos."),
  createPlanet(2.5,46,0xff3366,"El amor más fuerte que el mundo","Nuestro amor siempre encuentra la forma de seguir brillando.")
];

// =====================
// RAYCASTER PARA CLICK
// =====================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click",(event)=>{
  mouse.x = (event.clientX/window.innerWidth)*2-1;
  mouse.y = -(event.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const intersects = raycaster.intersectObjects(planets);
  if(intersects.length>0){
    targetPlanet = intersects[0].object;
    document.getElementById("panel").style.display = "block";
    document.getElementById("homeBtn").style.display = "block";
    document.getElementById("title").innerText = targetPlanet.userData.title;
    document.getElementById("text").innerText = targetPlanet.userData.text;
  }
});

// =====================
// BOTÓN VOLVER
// =====================
document.getElementById("homeBtn").onclick = ()=>{
  targetPlanet=null;
  camera.position.copy(homePosition);
  document.getElementById("panel").style.display="none";
  document.getElementById("homeBtn").style.display="none";
};

// =====================
// ANIMACIÓN PRINCIPAL
// =====================
function animate(){
  requestAnimationFrame(animate);

  // Movimiento planetas
  planets.forEach(p=>{
    p.userData.angle += 0.0018 + Math.random()*0.0004; // ligera variación
    p.position.x = Math.cos(p.userData.angle)*p.userData.distance;
    p.position.z = Math.sin(p.userData.angle)*p.userData.distance;
    p.rotation.y += 0.003 + Math.random()*0.001; // rotación natural
  });

  // Cámara tipo tour
  if(targetPlanet){
    const desiredPos = new THREE.Vector3(
      targetPlanet.position.x + 6,
      targetPlanet.position.y + 3,
      targetPlanet.position.z + 6
    );
    camera.position.lerp(desiredPos,0.05);
    camera.lookAt(targetPlanet.position);
  }

  // Estrellas parpadeo
  starMaterial.opacity = 0.8 + Math.random()*0.2;

  renderer.render(scene,camera);
}
animate();

// =====================
// AJUSTE VENTANA
// =====================
window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
