<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Museo Espacial</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family: Arial, sans-serif;}
.info-panel {
  position:absolute; top:20px; left:20px; color:white; background:rgba(0,0,0,0.5);
  padding:10px 15px; border-radius:10px; max-width:250px;
}
</style>
</head>
<body>

<div id="infoContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ===== ESCENA, CÁMARA Y RENDER =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 4000);
camera.position.set(0,30,70);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== CONTROLES =====
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 20;
controls.maxDistance = 200;

// ===== LUCES =====
const sunLight = new THREE.PointLight(0xffffff, 2);
sunLight.position.set(0,80,50);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0xffffff,0.2));

// ===== ESTRELLAS =====
const starGeo = new THREE.BufferGeometry();
const starVertices = [];
for(let i=0;i<50000;i++){
  starVertices.push((Math.random()-0.5)*4000, (Math.random()-0.5)*4000, (Math.random()-0.5)*4000);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices,3));
const stars = new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff,size:1.2,transparent:true,opacity:0.8}));
scene.add(stars);

// ===== NEBULOSA =====
const nebTexture = new THREE.TextureLoader().load('https://threejs.org/examples/textures/lensflare/lensflare0_alpha.png');
const nebGeo = new THREE.SphereGeometry(800,32,32);
const nebMat = new THREE.MeshBasicMaterial({map:nebTexture, transparent:true, opacity:0.15, side:THREE.BackSide});
const nebula = new THREE.Mesh(nebGeo, nebMat);
scene.add(nebula);

// ===== PLANETAS =====
const planetImages = [
  'https://drive.google.com/uc?export=view&id=1-ZV3iV8G1zMvGcnGUcry6Lrb_e3uQBux',
  'https://drive.google.com/uc?export=view&id=1sA2WRwr5Lm6PZ5K4Sd5lT49Y7HVBsQv7',
  'https://drive.google.com/uc?export=view&id=1TfXKawvIIogRdwt0aZcSFGncAgB60P29',
  'https://drive.google.com/uc?export=view&id=1s2yW7KT-Bszy8d3HmZU0_mxb0TgireWy',
  'https://drive.google.com/uc?export=view&id=1WLGVjSqDXHi7apBdkvwAszMLV-CN_h5h',
  'https://drive.google.com/uc?export=view&id=1cz2StgWxVU0FE-QeHMeasXNsTw99c9pA'
];

const planetInfo = [
  "Primer beso - Nuestro inicio",
  "Citas en el parque - Momentos felices",
  "Tus bromas - Siempre me hacen reír",
  "Nuestras llamadas - Recuerdos íntimos",
  "Historias juntos - Aventuras compartidas",
  "Amor fuerte - Siempre brillando"
];

const planets = [];
const infoContainer = document.getElementById('infoContainer');

planetImages.forEach((imgSrc,i)=>{
  const texture = new THREE.TextureLoader().load(imgSrc);
  const geo = new THREE.SphereGeometry(3 + Math.random(),64,64);
  const mat = new THREE.MeshPhongMaterial({map:texture, shininess:5});
  const planet = new THREE.Mesh(geo,mat);
  const angle = (i/planetImages.length) * Math.PI*2;
  const radius = 15 + i*10;
  planet.position.set(Math.cos(angle)*radius, 0, Math.sin(angle)*radius);
  scene.add(planet);
  planets.push(planet);

  // Crear panel de información siempre visible
  const div = document.createElement('div');
  div.className = 'info-panel';
  div.style.position = 'absolute';
  div.innerText = planetInfo[i];
  infoContainer.appendChild(div);
  planet.userData.infoDiv = div;
});

// ===== ANIMACIÓN =====
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);

  // Actualizar posición de paneles de info
  planets.forEach(p=>{
    const vector = p.position.clone();
    vector.project(camera);
    const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-vector.y * 0.5 + 0.5) * window.innerHeight;
    p.userData.infoDiv.style.left = `${x}px`;
    p.userData.infoDiv.style.top = `${y}px`;
  });
}

window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

animate();
</script>
</body>
</html>
