<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Nuestro Universo</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#panel{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.85);
color:white;
padding:20px;
border-radius:15px;
display:none;
max-width:420px;
text-align:center;
backdrop-filter:blur(10px);
}

</style>
</head>

<body>

<div id="panel">
<h2 id="title"></h2>
<p id="text"></p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
10000
)

const renderer = new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)

renderer.setPixelRatio(window.devicePixelRatio)

document.body.appendChild(renderer.domElement)

camera.position.set(0,10,30)


// LUCES

const light=new THREE.PointLight(0xffffff,2)

scene.add(light)

const ambient=new THREE.AmbientLight(0x888888)

scene.add(ambient)


// SOL

const sunGeo=new THREE.SphereGeometry(4,64,64)

const sunMat=new THREE.MeshBasicMaterial({color:0xffcc66})

const sun=new THREE.Mesh(sunGeo,sunMat)

scene.add(sun)


// GALAXIA ESPIRAL

const galaxyGeo=new THREE.BufferGeometry()

const vertices=[]

for(let i=0;i<50000;i++){

let r=Math.random()*800

let angle=r*0.05

let x=Math.cos(angle)*r+(Math.random()-0.5)*30
let y=(Math.random()-0.5)*20
let z=Math.sin(angle)*r+(Math.random()-0.5)*30

vertices.push(x,y,z)

}

galaxyGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(vertices,3)
)

const galaxyMat=new THREE.PointsMaterial({
color:0xffffff,
size:1
})

const galaxy=new THREE.Points(galaxyGeo,galaxyMat)

scene.add(galaxy)


// NEBULOSA

const nebulaGeo=new THREE.SphereGeometry(900,32,32)

const nebulaMat=new THREE.MeshBasicMaterial({
map:new THREE.TextureLoader().load(
"https://threejs.org/examples/textures/planets/earth_clouds_1024.png"
),
side:THREE.BackSide,
transparent:true,
opacity:0.2
})

const nebula=new THREE.Mesh(nebulaGeo,nebulaMat)

scene.add(nebula)


// PLANETAS

function createPlanet(size,distance,texture,title,text){

const geometry=new THREE.SphereGeometry(size,64,64)

const textureLoader=new THREE.TextureLoader()

const material=new THREE.MeshStandardMaterial({
map:textureLoader.load(texture)
})

const planet=new THREE.Mesh(geometry,material)

planet.userData={
distance:distance,
angle:Math.random()*Math.PI*2,
title:title,
text:text
}

scene.add(planet)

return planet

}


const earth=createPlanet(
1.5,
8,
"https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg",
"Nuestro primer beso",
"El momento donde comenzó nuestro universo."
)

const mars=createPlanet(
1.2,
13,
"https://threejs.org/examples/textures/planets/mars_1024.jpg",
"Nuestra primera cita",
"El día que supe que quería más momentos contigo."
)

const saturn=createPlanet(
2,
20,
"https://threejs.org/examples/textures/planets/jupiter.jpg",
"Cuando me enamoré",
"El día que entendí que eres única."
)


// ANILLOS DE SATURNO

const ringGeo=new THREE.RingGeometry(2.8,4,64)

const ringMat=new THREE.MeshBasicMaterial({
color:0xaaaaaa,
side:THREE.DoubleSide
})

const ring=new THREE.Mesh(ringGeo,ringMat)

ring.rotation.x=Math.PI/2

saturn.add(ring)


const future=createPlanet(
1.7,
28,
"https://threejs.org/examples/textures/planets/venus.jpg",
"Nuestro futuro",
"Los mejores recuerdos contigo todavía no existen."
)

const planets=[earth,mars,saturn,future]


// ESTRELLAS FUGACES

function shootingStar(){

const geo=new THREE.SphereGeometry(0.2,8,8)

const mat=new THREE.MeshBasicMaterial({color:0xffffff})

const star=new THREE.Mesh(geo,mat)

star.position.set(
(Math.random()-0.5)*300,
100,
(Math.random()-0.5)*300
)

scene.add(star)

let speed=4

function move(){

star.position.y-=speed
star.position.x+=speed

if(star.position.y<-100){
scene.remove(star)
}else{
requestAnimationFrame(move)
}

}

move()

}

setInterval(shootingStar,2500)


// ANIMACION

function animate(){

requestAnimationFrame(animate)

planets.forEach(p=>{

p.userData.angle+=0.002

p.position.x=Math.cos(p.userData.angle)*p.userData.distance
p.position.z=Math.sin(p.userData.angle)*p.userData.distance

})

galaxy.rotation.y+=0.0003
nebula.rotation.y+=0.0001

renderer.render(scene,camera)

}

animate()


// CLICK PLANETAS

const raycaster=new THREE.Raycaster()

const mouse=new THREE.Vector2()

window.addEventListener("click",event=>{

mouse.x=(event.clientX/window.innerWidth)*2-1
mouse.y=-(event.clientY/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const intersects=raycaster.intersectObjects(planets)

if(intersects.length>0){

let p=intersects[0].object

document.getElementById("panel").style.display="block"

document.getElementById("title").innerText=p.userData.title

document.getElementById("text").innerText=p.userData.text

camera.position.set(
p.position.x*1.6,
p.position.y+3,
p.position.z*1.6
)

}

})

</script>

</body>
</html>
