<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestro Universo 💖</title>
<style>
body{margin:0;overflow:hidden;background:black;}
canvas{display:block;}
#info{
position:absolute;
top:20px;
left:20px;
color:white;
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:10px;
max-width:300px;
font-family:Arial;
}
button{
margin-top:10px;
padding:5px 10px;
border:none;
background:#ff4d6d;
color:white;
border-radius:5px;
cursor:pointer;
}
</style>
</head>
<body>

<div id="info">
<h2>Nuestro universo 💫</h2>
<p>Arrastra para explorar</p>
<button onclick="resetCamera()">Volver</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.z = 15;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// 🌟 LUCES (ESTO ES CLAVE)
const light1 = new THREE.PointLight(0xffffff,2);
light1.position.set(10,10,10);
scene.add(light1);

const light2 = new THREE.AmbientLight(0xffffff,0.5);
scene.add(light2);

// 🌌 ESTRELLAS BONITAS
const starsGeometry = new THREE.BufferGeometry();
const starVertices = [];

for(let i=0;i<2000;i++){
starVertices.push(
(Math.random()-0.5)*200,
(Math.random()-0.5)*200,
(Math.random()-0.5)*200
);
}

starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices,3));

const starsMaterial = new THREE.PointsMaterial({
color:0xffffff,
size:0.7
});

const stars = new THREE.Points(starsGeometry,starsMaterial);
scene.add(stars);

// 📸 TEXTURAS
const loader = new THREE.TextureLoader();

// ⚠️ USA EXACTAMENTE ESTOS FORMATOS SEGÚN TU REPO
const formatos=[
"JPG","PNG","JPG","PNG","PNG","JPG","PNG","JPG","JPG","JPG",
"JPG","JPG","JPG","JPG","JPG","JPG","JPG","JPG","JPG"
];

// 💖 FRASES
const textos=[
"Nos pusimos al día ",
"Mensajes que me chivean ",
"Cartas llenas de amor ",
"Dibujos que adoro ",
"Momentos solo nuestros ",
"Regalos inolvidables ",
"Nuestro primer paso ",
"Momentos de pareja ",
"Besos bajo la lluvia ",
"Reímos hasta doler ",
"Mi favorita ",
"Me cambiaste la vida ",
"Nuestra unión ",
"El inicio de todo ",
"Esa noche especial ",
"Nosotros ",
"Nuestro hijo ",
"La flor ",
"Nuestro amor eterno "
];

const planets=[];

for(let i=0;i<19;i++){

let textura = loader.load(`./${i+1}.${formatos[i]}`);

const geometry = new THREE.SphereGeometry(1.2,64,64);
const material = new THREE.MeshStandardMaterial({
map:textura,
roughness:0.7,
metalness:0.1
});

const planet = new THREE.Mesh(geometry,material);

planet.position.x = Math.cos(i)*10;
planet.position.z = Math.sin(i)*10;

scene.add(planet);

planet.userData = {texto:textos[i]};
planets.push(planet);
}

// 🖱️ MOUSE CONTROL
let mouseDown=false;

document.addEventListener("mousedown",()=>mouseDown=true);
document.addEventListener("mouseup",()=>mouseDown=false);

document.addEventListener("mousemove",(e)=>{
if(mouseDown){
camera.position.x -= e.movementX*0.01;
camera.position.y += e.movementY*0.01;
}
});

// 🎯 CLICK PLANETAS
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

document.addEventListener("click",(event)=>{
mouse.x = (event.clientX/window.innerWidth)*2 -1;
mouse.y = -(event.clientY/window.innerHeight)*2 +1;

raycaster.setFromCamera(mouse,camera);

const intersects = raycaster.intersectObjects(planets);

if(intersects.length>0){
const p = intersects[0].object;
document.getElementById("info").innerHTML = `
<h2>${p.userData.texto}</h2>
<button onclick="resetCamera()">Volver</button>
`;
camera.position.set(p.position.x,p.position.y,p.position.z+3);
}
});

// 🔄 RESET
function resetCamera(){
camera.position.set(0,0,15);
document.getElementById("info").innerHTML = `
<h2>Nuestro universo 💫</h2>
<p>Arrastra para explorar</p>
<button onclick="resetCamera()">Volver</button>
`;
}

// 🎥 ANIMACIÓN
function animate(){
requestAnimationFrame(animate);

planets.forEach(p=>{
p.rotation.y += 0.003;
});

renderer.render(scene,camera);
}

animate();

// RESPONSIVE
window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
