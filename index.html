<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Nuestro Universo</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#panel{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.9);
color:white;
padding:25px;
border-radius:15px;
display:none;
max-width:420px;
text-align:center;
}

#title{
font-size:22px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div id="panel">
<h2 id="title"></h2>
<p id="text"></p>
</div>

<audio autoplay loop>
<source src="music.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
10000
)

const renderer = new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

camera.position.set(0,10,30)


// LUCES

const light=new THREE.PointLight(0xffffff,2)
scene.add(light)

const ambient=new THREE.AmbientLight(0x888888)
scene.add(ambient)


// SOL

const sunGeo=new THREE.SphereGeometry(4,64,64)
const sunMat=new THREE.MeshBasicMaterial({color:0xffcc66})
const sun=new THREE.Mesh(sunGeo,sunMat)

scene.add(sun)


// ESTRELLAS

const starGeo=new THREE.BufferGeometry()
const starVertices=[]

for(let i=0;i<40000;i++){

let x=(Math.random()-0.5)*2000
let y=(Math.random()-0.5)*2000
let z=(Math.random()-0.5)*2000

starVertices.push(x,y,z)

}

starGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(starVertices,3)
)

const starMat=new THREE.PointsMaterial({
color:0xffffff,
size:0.7,
transparent:true
})

const stars=new THREE.Points(starGeo,starMat)

scene.add(stars)


// CONSTELACION (nombre)

function createName(){

const geometry=new THREE.BufferGeometry()

const vertices=[
0,60,0,
5,65,0,
10,60,0,
15,65,0,
20,60,0
]

geometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(vertices,3)
)

const material=new THREE.PointsMaterial({
color:0xff88ff,
size:2
})

const nameStars=new THREE.Points(geometry,material)

scene.add(nameStars)

}

createName()


// PLANETAS

function createPlanet(size,distance,texture,title,text){

const geo=new THREE.SphereGeometry(size,64,64)

const textureLoader=new THREE.TextureLoader()

const mat=new THREE.MeshStandardMaterial({
map:textureLoader.load(texture)
})

const planet=new THREE.Mesh(geo,mat)

planet.userData={
distance:distance,
angle:Math.random()*Math.PI*2,
title:title,
text:text
}

scene.add(planet)

return planet

}


const kiss=createPlanet(
1.4,
8,
"https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg",
"Nuestro primer beso",
"El momento donde comenzó nuestro universo."
)

const park=createPlanet(
1.4,
13,
"https://threejs.org/examples/textures/planets/venus.jpg",
"Citas en el parque",
"Los días tranquilos contigo siempre son especiales."
)

const fights=createPlanet(
1.4,
18,
"https://threejs.org/examples/textures/planets/mars_1024.jpg",
"Nuestras peleas",
"Aunque discutimos, siempre encontramos la forma de volver a amarnos."
)

const jokes=createPlanet(
1.4,
23,
"https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg",
"Nuestras bromas",
"Las risas contigo son de mis cosas favoritas."
)

const future=createPlanet(
2,
30,
"https://threejs.org/examples/textures/planets/jupiter.jpg",
"Nuestro futuro",
"Aún nos quedan millones de recuerdos por crear."
)

const planets=[kiss,park,fights,jokes,future]


// ANILLO PLANETA

const ringGeo=new THREE.RingGeometry(2.8,4,64)

const ringMat=new THREE.MeshBasicMaterial({
color:0xaaaaaa,
side:THREE.DoubleSide
})

const ring=new THREE.Mesh(ringGeo,ringMat)

ring.rotation.x=Math.PI/2

future.add(ring)


// ESTRELLAS FUGACES

function shootingStar(){

const geo=new THREE.SphereGeometry(0.2,8,8)
const mat=new THREE.MeshBasicMaterial({color:0xffffff})

const star=new THREE.Mesh(geo,mat)

star.position.set(
(Math.random()-0.5)*300,
100,
(Math.random()-0.5)*300
)

scene.add(star)

let speed=4

function move(){

star.position.y-=speed
star.position.x+=speed

if(star.position.y<-100){

scene.remove(star)

}else{

requestAnimationFrame(move)

}

}

move()

}

setInterval(shootingStar,3000)


// CONTROL MOUSE

let mouseX=0
let mouseY=0

document.addEventListener("mousemove",(event)=>{

mouseX=(event.clientX-window.innerWidth/2)/200
mouseY=(event.clientY-window.innerHeight/2)/200

})


// ANIMACION

function animate(){

requestAnimationFrame(animate)

camera.position.x += (mouseX - camera.position.x)*0.02
camera.position.y += (-mouseY - camera.position.y)*0.02

planets.forEach(p=>{

p.userData.angle+=0.002

p.position.x=Math.cos(p.userData.angle)*p.userData.distance
p.position.z=Math.sin(p.userData.angle)*p.userData.distance

})

renderer.render(scene,camera)

}

animate()


// CLICK PLANETAS

const raycaster=new THREE.Raycaster()

const mouse=new THREE.Vector2()

window.addEventListener("click",event=>{

mouse.x=(event.clientX/window.innerWidth)*2-1
mouse.y=-(event.clientY/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const intersects=raycaster.intersectObjects(planets)

if(intersects.length>0){

let p=intersects[0].object

document.getElementById("panel").style.display="block"

document.getElementById("title").innerText=p.userData.title
document.getElementById("text").innerText=p.userData.text

camera.position.set(
p.position.x*1.5,
p.position.y+2,
p.position.z*1.5
)

}

})

</script>
</body>
</html>
