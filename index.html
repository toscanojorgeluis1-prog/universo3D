<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>Universo para Ale</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#panel{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.85);
color:white;
padding:20px;
border-radius:15px;
display:none;
max-width:420px;
text-align:center;
}

#homeBtn{
position:absolute;
top:20px;
left:20px;
padding:10px 15px;
background:rgba(0,0,0,0.8);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
display:none;
}

</style>

</head>

<body>

<button id="homeBtn">Volver</button>

<div id="panel">
<h2 id="title"></h2>
<p id="text"></p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
2000
)

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setPixelRatio(window.devicePixelRatio)

document.body.appendChild(renderer.domElement)

camera.position.set(0,10,35)

const loader = new THREE.TextureLoader()

let targetPlanet=null

const homePosition = new THREE.Vector3(0,10,35)


// LUCES

const light = new THREE.PointLight(0xffffff,2)
scene.add(light)

const ambient = new THREE.AmbientLight(0x666666)
scene.add(ambient)


// ESTRELLAS

const starGeometry = new THREE.BufferGeometry()

const starVertices=[]

for(let i=0;i<30000;i++){

starVertices.push(
(Math.random()-0.5)*2000,
(Math.random()-0.5)*2000,
(Math.random()-0.5)*2000
)

}

starGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(starVertices,3)
)

const starMaterial = new THREE.PointsMaterial({
color:0xffffff,
size:0.7
})

const stars = new THREE.Points(starGeometry,starMaterial)

scene.add(stars)


// FUNCION PLANETA

function createPlanet(size,distance,texture,title,text){

const geo = new THREE.SphereGeometry(size,64,64)

const mat = new THREE.MeshStandardMaterial({
map: loader.load(texture)
})

const planet = new THREE.Mesh(geo,mat)

planet.userData={
distance:distance,
angle:Math.random()*Math.PI*2,
title:title,
text:text
}

scene.add(planet)

return planet

}


// PLANETAS

const planets=[]

planets.push(createPlanet(
1.5,
8,
"https://threejs.org/examples/textures/planets/venus.jpg",
"Nuestro primer beso",
"El momento donde empezó todo nuestro universo."
))

planets.push(createPlanet(
1.7,
13,
"https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg",
"Citas en el parque",
"Los momentos tranquilos contigo siempre se quedan en mi corazón."
))

planets.push(createPlanet(
1.4,
18,
"https://threejs.org/examples/textures/planets/mars_1k_color.jpg",
"Tus bromas apestosas",
"Aunque a veces son terribles, siempre terminan haciéndome reír."
))

planets.push(createPlanet(
1.8,
23,
"https://threejs.org/examples/textures/planets/jupiter.jpg",
"Nuestras llamadas",
"Cada llamada contigo es un recordatorio de que siempre estás ahí."
))

planets.push(createPlanet(
1.6,
28,
"https://threejs.org/examples/textures/planets/mercury.jpg",
"Nuestras historias",
"Las historias que hemos vivido juntos son las que quiero seguir escribiendo."
))

planets.push(createPlanet(
2.1,
33,
"https://threejs.org/examples/textures/planets/neptune.jpg",
"Nosotros",
"Tú y yo, simplemente siendo nosotros."
))

planets.push(createPlanet(
2.3,
38,
"https://threejs.org/examples/textures/planets/saturn.jpg",
"El amor más fuerte que el mundo",
"Nuestro amor siempre encuentra la forma de seguir brillando."
))


// CLICK PLANETAS

const raycaster = new THREE.Raycaster()
const mouse = new THREE.Vector2()

window.addEventListener("click",event=>{

mouse.x=(event.clientX/window.innerWidth)*2-1
mouse.y=-(event.clientY/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const intersects=raycaster.intersectObjects(planets)

if(intersects.length>0){

targetPlanet=intersects[0].object

document.getElementById("panel").style.display="block"
document.getElementById("homeBtn").style.display="block"

document.getElementById("title").innerText=targetPlanet.userData.title
document.getElementById("text").innerText=targetPlanet.userData.text

}

})


// BOTON VOLVER

document.getElementById("homeBtn").onclick=function(){

targetPlanet=null

camera.position.copy(homePosition)

document.getElementById("panel").style.display="none"
document.getElementById("homeBtn").style.display="none"

}


// ANIMACION

function animate(){

requestAnimationFrame(animate)

planets.forEach(p=>{

p.userData.angle+=0.002

p.position.x=Math.cos(p.userData.angle)*p.userData.distance
p.position.z=Math.sin(p.userData.angle)*p.userData.distance

p.rotation.y+=0.003

})

if(targetPlanet){

camera.position.lerp(
new THREE.Vector3(
targetPlanet.position.x+6,
targetPlanet.position.y+2,
targetPlanet.position.z+6
),0.05
)

camera.lookAt(targetPlanet.position)

}

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
