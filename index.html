<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>Nuestro Universo</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#panel{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.85);
color:white;
padding:20px;
border-radius:15px;
display:none;
max-width:420px;
text-align:center;
}

#homeBtn{
position:absolute;
top:20px;
left:20px;
padding:10px 15px;
background:rgba(0,0,0,0.8);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
display:none;
}
</style>

</head>

<body>

<button id="homeBtn">Volver</button>

<div id="panel">
<h2 id="title"></h2>
<p id="text"></p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
2000
)

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setPixelRatio(window.devicePixelRatio)

document.body.appendChild(renderer.domElement)

camera.position.set(0,15,50)

let targetPlanet=null
const homePosition=new THREE.Vector3(0,15,50)

const loader=new THREE.TextureLoader()

// LUCES

const light=new THREE.PointLight(0xffffff,4)
light.position.set(0,40,30)
scene.add(light)

const ambient=new THREE.AmbientLight(0xffffff,1)
scene.add(ambient)

// ESTRELLAS

const starGeo=new THREE.BufferGeometry()
const starVertices=[]

for(let i=0;i<50000;i++){
starVertices.push(
(Math.random()-0.5)*3000,
(Math.random()-0.5)*3000,
(Math.random()-0.5)*3000
)
}

starGeo.setAttribute('position',new THREE.Float32BufferAttribute(starVertices,3))

const stars=new THREE.Points(
starGeo,
new THREE.PointsMaterial({color:0xffffff,size:1})
)

scene.add(stars)


// CREAR PLANETA CON FOTO

function createPlanet(size,distance,img,title,text){

const geo=new THREE.SphereGeometry(size,64,64)

const mat=new THREE.MeshPhongMaterial({
map: loader.load("imagenes/"+img)
})

const planet=new THREE.Mesh(geo,mat)

planet.userData={
distance:distance,
angle:Math.random()*Math.PI*2,
title:title,
text:text
}

scene.add(planet)

// ATMOSFERA

const glow=new THREE.Mesh(
new THREE.SphereGeometry(size*1.08,64,64),
new THREE.MeshBasicMaterial({
color:0x66ccff,
transparent:true,
opacity:0.2
})
)

planet.add(glow)

return planet
}


// CREAR 19 PLANETAS

const planets=[]

for(let i=1;i<=19;i++){

planets.push(createPlanet(
1.3 + Math.random(),
8 + i*3,
"img"+i+".png",
"Recuerdo "+i,
"Este es uno de nuestros momentos juntos que guardo para siempre 💖"
))

}


// CLICK

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

window.addEventListener("click",event=>{

mouse.x=(event.clientX/window.innerWidth)*2-1
mouse.y=-(event.clientY/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const intersects=raycaster.intersectObjects(planets)

if(intersects.length>0){

targetPlanet=intersects[0].object

document.getElementById("panel").style.display="block"
document.getElementById("homeBtn").style.display="block"

document.getElementById("title").innerText=targetPlanet.userData.title
document.getElementById("text").innerText=targetPlanet.userData.text

}

})


// BOTON VOLVER

document.getElementById("homeBtn").onclick=function(){

targetPlanet=null
camera.position.copy(homePosition)

document.getElementById("panel").style.display="none"
document.getElementById("homeBtn").style.display="none"

}


// ANIMACION

function animate(){

requestAnimationFrame(animate)

planets.forEach(p=>{

p.userData.angle+=0.002

p.position.x=Math.cos(p.userData.angle)*p.userData.distance
p.position.z=Math.sin(p.userData.angle)*p.userData.distance

p.rotation.y+=0.003

})

if(targetPlanet){

camera.position.lerp(
new THREE.Vector3(
targetPlanet.position.x+5,
targetPlanet.position.y+2,
targetPlanet.position.z+5
),0.05
)

camera.lookAt(targetPlanet.position)

}

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
