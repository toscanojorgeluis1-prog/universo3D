<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>El Universo de Ale - Texturas completas</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family: Arial, sans-serif;}
#panel { position:absolute; bottom:30px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:white; padding:20px; border-radius:15px; display:none; max-width:420px; text-align:center;}
#homeBtn { position:absolute; top:20px; left:20px; padding:10px 15px; background:rgba(0,0,0,0.8); color:white; border:none; border-radius:10px; cursor:pointer; display:none;}
</style>
</head>
<body>

<button id="homeBtn">Volver al inicio</button>
<div id="panel">
  <h2 id="title"></h2>
  <p id="text"></p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// =====================
// ESCENA, CÁMARA Y RENDER
// =====================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 4000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);
camera.position.set(0, 30, 70);
const homePosition = camera.position.clone();
let targetPlanet = null;

// =====================
// LUCES
// =====================
const sunLight = new THREE.PointLight(0xffffff, 5);
sunLight.position.set(0,80,50);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0xffffff, 0.3));

// =====================
// ESTRELLAS DINÁMICAS
// =====================
const starGeo = new THREE.BufferGeometry();
const starVertices = [];
for(let i=0;i<80000;i++){
  starVertices.push(
    (Math.random()-0.5)*4000,
    (Math.random()-0.5)*4000,
    (Math.random()-0.5)*4000
  );
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices,3));
const starMaterial = new THREE.PointsMaterial({color:0xffffff, size:1.2, transparent:true});
const stars = new THREE.Points(starGeo, starMaterial);
scene.add(stars);

// =====================
// TEXTURAS DE PLANETAS
// =====================
const loader = new THREE.TextureLoader();
const textures = {
  earthColor: loader.load('https://threejsfundamentals.org/threejs/resources/images/earth-day.jpg'),
  earthBump: loader.load('https://threejsfundamentals.org/threejs/resources/images/earthbump1k.jpg'),
  earthClouds: loader.load('https://threejsfundamentals.org/threejs/resources/images/earth-clouds.png'),

  marsColor: loader.load('https://threejsfundamentals.org/threejs/resources/images/mars_1k_color.jpg'),
  marsBump: loader.load('https://threejsfundamentals.org/threejs/resources/images/mars_1k_bump.jpg'),

  jupiterColor: loader.load('https://threejsfundamentals.org/threejs/resources/images/jupiter2_1k.jpg'),
  jupiterBump: loader.load('https://threejsfundamentals.org/threejs/resources/images/jupiter2_1k.jpg'),

  venusColor: loader.load('https://threejsfundamentals.org/threejs/resources/images/venus.jpg'),
  mercuryColor: loader.load('https://threejsfundamentals.org/threejs/resources/images/mercury.jpg'),
  neptuneColor: loader.load('https://threejsfundamentals.org/threejs/resources/images/neptune.jpg'),
  saturnColor: loader.load('https://threejsfundamentals.org/threejs/resources/images/saturn.jpg'),
  ring: loader.load('https://threejsfundamentals.org/threejs/resources/images/saturnringcolor.jpg')
};

// =====================
// FUNCION CREAR PLANETA
// =====================
function createPlanet(size, distance, colorMap, bumpMap, title, text, options={}){
  const geometry = new THREE.SphereGeometry(size,64,64);
  const materialOptions = { map: colorMap, roughness:1, metalness:0 };
  if(bumpMap) materialOptions.bumpMap = bumpMap;
  if(bumpMap) materialOptions.bumpScale = 0.2;
  const material = new THREE.MeshStandardMaterial(materialOptions);
  const planet = new THREE.Mesh(geometry, material);
  planet.userData = {distance, angle:Math.random()*Math.PI*2, title, text};
  scene.add(planet);

  // Nubes
  if(options.clouds){
    const cloudGeo = new THREE.SphereGeometry(size*1.01,64,64);
    const cloudMat = new THREE.MeshPhongMaterial({ map: textures.earthClouds, transparent:true, opacity:0.4, depthWrite:false });
    const clouds = new THREE.Mesh(cloudGeo, cloudMat);
    planet.add(clouds);
    planet.userData.clouds = clouds;
  }

  // Anillos
  if(options.ring){
    const ringGeo = new THREE.RingGeometry(size*1.2, size*2, 64);
    const ringMat = new THREE.MeshBasicMaterial({ map: textures.ring, side:THREE.DoubleSide, transparent:true, opacity:0.8 });
    const ringMesh = new THREE.Mesh(ringGeo, ringMat);
    ringMesh.rotation.x = -0.5*Math.PI;
    planet.add(ringMesh);
  }

  return planet;
}

// =====================
// PLANETAS
// =====================
const planets = [
  createPlanet(1.6,10,textures.earthColor,textures.earthBump,"Nuestro primer beso","El momento donde empezó nuestro universo.", {clouds:true}),
  createPlanet(1.8,16,textures.marsColor,textures.marsBump,"Citas en el parque","Las tardes contigo en el parque siempre son especiales."),
  createPlanet(1.5,22,textures.jupiterColor,textures.jupiterBump,"Tus bromas apestosas","Aunque a veces son terribles, siempre terminan haciéndome reír."),
  createPlanet(2.0,28,textures.venusColor,null,"Nuestras llamadas","Cada llamada contigo me recuerda cuánto significas para mí."),
  createPlanet(1.7,34,textures.mercuryColor,null,"Nuestras historias","Cada historia contigo es una página más de nuestra aventura."),
  createPlanet(2.3,40,textures.neptuneColor,null,"Nosotros","Tú y yo, siendo nosotros mismos."),
  createPlanet(2.5,46,textures.saturnColor,null,"El amor más fuerte que el mundo","Nuestro amor siempre encuentra la forma de seguir brillando.", {ring:true})
];

// =====================
// RAYCASTER
// =====================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
window.addEventListener("click",(event)=>{
  mouse.x = (event.clientX/window.innerWidth)*2-1;
  mouse.y = -(event.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const intersects = raycaster.intersectObjects(planets);
  if(intersects.length>0){
    targetPlanet = intersects[0].object;
    document.getElementById("panel").style.display = "block";
    document.getElementById("homeBtn").style.display = "block";
    document.getElementById("title").innerText = targetPlanet.userData.title;
    document.getElementById("text").innerText = targetPlanet.userData.text;
  }
});

// =====================
// BOTÓN VOLVER
// =====================
document.getElementById("homeBtn").onclick = ()=>{
  targetPlanet=null;
  camera.position.copy(homePosition);
  document.getElementById("panel").style.display="none";
  document.getElementById("homeBtn").style.display="none";
};

// =====================
// ANIMACIÓN
// =====================
function animate(){
  requestAnimationFrame(animate);
  planets.forEach(p=>{
    p.userData.angle += 0.0015 + Math.random()*0.0004;
    p.position.x = Math.cos(p.userData.angle)*p.userData.distance;
    p.position.z = Math.sin(p.userData.angle)*p.userData.distance;
    p.rotation.y += 0.003 + Math.random()*0.001;
    if(p.userData.clouds) p.userData.clouds.rotation.y += 0.002;
  });
  if(targetPlanet){
    const desiredPos = new THREE.Vector3(targetPlanet.position.x+6, targetPlanet.position.y+3, targetPlanet.position.z+6);
    camera.position.lerp(desiredPos,0.05);
    camera.lookAt(targetPlanet.position);
  }
  starMaterial.opacity = 0.8 + Math.random()*0.2;
  renderer.render(scene,camera);
}
animate();

// =====================
// AJUSTE VENTANA
// =====================
window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
