<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>Para Ale 💖</title>

<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;}

#panel{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.85);
color:white;
padding:20px;
border-radius:15px;
display:none;
max-width:420px;
text-align:center;
}

#homeBtn{
position:absolute;
top:20px;
left:20px;
padding:10px 15px;
background:rgba(0,0,0,0.8);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
display:none;
}
</style>

</head>

<body>

<button id="homeBtn">Volver</button>

<div id="panel">
<h2 id="title"></h2>
<p id="text"></p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,3000)
const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setPixelRatio(window.devicePixelRatio)
document.body.appendChild(renderer.domElement)

camera.position.set(0,15,60)

let targetPlanet=null
const homePosition=new THREE.Vector3(0,15,60)

const loader=new THREE.TextureLoader()

// LUCES

const light=new THREE.PointLight(0xffffff,4)
light.position.set(0,50,40)
scene.add(light)

scene.add(new THREE.AmbientLight(0xffffff,1))

// ESTRELLAS

const starGeo=new THREE.BufferGeometry()
const starVertices=[]

for(let i=0;i<60000;i++){
starVertices.push(
(Math.random()-0.5)*4000,
(Math.random()-0.5)*4000,
(Math.random()-0.5)*4000
)
}

starGeo.setAttribute('position',new THREE.Float32BufferAttribute(starVertices,3))

scene.add(new THREE.Points(
starGeo,
new THREE.PointsMaterial({color:0xffffff,size:1})
))


// DATOS (TUS TEXTOS)

const textos=[
"ese día que nos pusimos al día con todo para despues vernos esa tarde",
"aquellos mensajes tan lindos que aun me chivean",
"aquellas cartas en las que es más amor que palabras",
"aquellos dibujos que adoro con todo mi corazón",
"aquellos momentos nuestros y solo nuestros que nadie más podrá tener",
"esos regalos inolvidables",
"aquel primer paso que recuerdo como si fuera de ayer",
"esos momentos de pareja nuestra que me encanta tener contigo",
"aquel día que tatuaste tus besos en mis labios bajo la lluvia que tanto nos encanta",
"aquel día que nos dolia el estomago de tanto reir juntos",
"mi foto favorita que tanto adoro",
"aquel día que me sacaste de mi zona de confort y no quise regresar nunca mas",
"nuestra union",
"aquello que lo inicio todo",
"esa noche que nos dimos cuenta que ambos queriamos amarnos sin importar nada",
"nosotros",
"nuestro hijo",
"esa flor que significa tanto para mi",
"ese amor que solo se enciende más"
]

// FORMATOS

const formatos=[
"png","png","jpg","png","png","jpg","png","jpg","jpg","jpg",
"jpg","jpg","jpg","jpg","jpg","jpg","jpg","jpg","jpg"
]

// CREAR PLANETAS

const planets=[]

for(let i=0;i<19;i++){

const geo=new THREE.SphereGeometry(1.5,64,64)

const mat=new THREE.MeshPhongMaterial({
map: loader.load("imagenes/"+(i+1)+"."+formatos[i])
})

const planet=new THREE.Mesh(geo,mat)

planet.userData={
distance:10+i*3,
angle:Math.random()*Math.PI*2,
text:textos[i]
}

scene.add(planet)

const glow=new THREE.Mesh(
new THREE.SphereGeometry(1.7,64,64),
new THREE.MeshBasicMaterial({color:0x66ccff,transparent:true,opacity:0.2})
)

planet.add(glow)

planets.push(planet)

}


// CONTROLES CON MOUSE (ARRASTRAR)

let isDragging=false
let prevMouse={x:0,y:0}

window.addEventListener("mousedown",e=>{
isDragging=true
prevMouse.x=e.clientX
prevMouse.y=e.clientY
})

window.addEventListener("mouseup",()=>isDragging=false)

window.addEventListener("mousemove",e=>{
if(!isDragging)return

let dx=e.clientX-prevMouse.x
let dy=e.clientY-prevMouse.y

scene.rotation.y+=dx*0.002
scene.rotation.x+=dy*0.002

prevMouse.x=e.clientX
prevMouse.y=e.clientY
})

// ZOOM

window.addEventListener("wheel",e=>{
camera.position.z+=e.deltaY*0.05
})

// CLICK

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

window.addEventListener("click",event=>{

mouse.x=(event.clientX/window.innerWidth)*2-1
mouse.y=-(event.clientY/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const intersects=raycaster.intersectObjects(planets)

if(intersects.length>0){

targetPlanet=intersects[0].object

document.getElementById("panel").style.display="block"
document.getElementById("homeBtn").style.display="block"

document.getElementById("title").innerText="💖"
document.getElementById("text").innerText=targetPlanet.userData.text

}

})

// BOTON

document.getElementById("homeBtn").onclick=function(){
targetPlanet=null
camera.position.copy(homePosition)
document.getElementById("panel").style.display="none"
this.style.display="none"
}

// ANIMACION

function animate(){
requestAnimationFrame(animate)

planets.forEach(p=>{
p.userData.angle+=0.002
p.position.x=Math.cos(p.userData.angle)*p.userData.distance
p.position.z=Math.sin(p.userData.angle)*p.userData.distance
p.rotation.y+=0.003
})

if(targetPlanet){
camera.position.lerp(
new THREE.Vector3(
targetPlanet.position.x+5,
targetPlanet.position.y+2,
targetPlanet.position.z+5
),0.05
)
camera.lookAt(targetPlanet.position)
}

renderer.render(scene,camera)
}

animate()

</script>

</body>
</html>
