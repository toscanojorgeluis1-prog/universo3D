<!DOCTYPE html>
<html>
<head>
<title>Nuestro Universo</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

#panel{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.85);
color:white;
padding:20px;
border-radius:15px;
display:none;
max-width:400px;
text-align:center;
}

#panel img{
width:100%;
border-radius:10px;
margin-top:10px;
}

</style>
</head>

<body>

<div id="panel">
<h2 id="title"></h2>
<p id="text"></p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
2000
)

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

camera.position.z=20

// estrellas

const starGeometry=new THREE.BufferGeometry()
const starVertices=[]

for(let i=0;i<8000;i++){

const x=(Math.random()-0.5)*2000
const y=(Math.random()-0.5)*2000
const z=(Math.random()-0.5)*2000

starVertices.push(x,y,z)

}

starGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(starVertices,3)
)

const starMaterial=new THREE.PointsMaterial({color:0xffffff})

const stars=new THREE.Points(starGeometry,starMaterial)

scene.add(stars)

// luz

const light=new THREE.PointLight(0xffffff,2)

scene.add(light)

// sol

const sunGeometry=new THREE.SphereGeometry(2,32,32)

const sunMaterial=new THREE.MeshBasicMaterial({color:0xffaa00})

const sun=new THREE.Mesh(sunGeometry,sunMaterial)

scene.add(sun)

// crear planetas

function createPlanet(size,distance,color,title,text){

const geometry=new THREE.SphereGeometry(size,32,32)

const material=new THREE.MeshStandardMaterial({color:color})

const planet=new THREE.Mesh(geometry,material)

planet.userData={
distance:distance,
angle:Math.random()*Math.PI*2,
title:title,
text:text
}

scene.add(planet)

return planet

}

const planet1=createPlanet(
0.6,
4,
0x8844ff,
"Nuestro primer beso",
"El día en que comenzó nuestro universo."
)

const planet2=createPlanet(
0.7,
7,
0x44ff88,
"Nuestra primera cita",
"Cuando entendí que quería más momentos contigo."
)

const planet3=createPlanet(
0.9,
10,
0xff4488,
"Cuando me enamoré",
"Aquí supe que eres única para mí."
)

const planet4=createPlanet(
1.2,
14,
0x4488ff,
"El planeta secreto",
"Los mejores recuerdos contigo aún no existen… porque aún tenemos un universo por descubrir."
)

const planets=[planet1,planet2,planet3,planet4]

// estrellas fugaces

function shootingStar(){

const geometry=new THREE.SphereGeometry(0.1,8,8)
const material=new THREE.MeshBasicMaterial({color:0xffffff})

const star=new THREE.Mesh(geometry,material)

star.position.set(
(Math.random()-0.5)*200,
50,
(Math.random()-0.5)*200
)

scene.add(star)

let speed=1+Math.random()

function move(){

star.position.y-=speed
star.position.x+=speed

if(star.position.y<-50){
scene.remove(star)
}else{
requestAnimationFrame(move)
}

}

move()

}

setInterval(shootingStar,3000)

// animación

function animate(){

requestAnimationFrame(animate)

planets.forEach(p=>{

p.userData.angle+=0.01

p.position.x=Math.cos(p.userData.angle)*p.userData.distance
p.position.z=Math.sin(p.userData.angle)*p.userData.distance

})

renderer.render(scene,camera)

}

animate()

// click en planetas

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

window.addEventListener('click',event=>{

mouse.x=(event.clientX/window.innerWidth)*2-1
mouse.y=-(event.clientY/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const intersects=raycaster.intersectObjects(planets)

if(intersects.length>0){

let planet=intersects[0].object

document.getElementById("panel").style.display="block"

document.getElementById("title").innerText=
planet.userData.title

document.getElementById("text").innerText=
planet.userData.text

}

})

</script>

</body>
</html>
