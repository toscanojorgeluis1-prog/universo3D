// CONSTELACION

function createConstellation(name){

const loader = new THREE.FontLoader()

loader.load("https://threejs.org/examples/fonts/helvetiker_regular.typeface.json",function(font){

const textGeo = new THREE.TextGeometry(name,{
font:font,
size:8,
height:0.1
})

textGeo.center()

const positions=[]
const pos=textGeo.attributes.position

for(let i=0;i<pos.count;i++){

positions.push(
pos.getX(i)*2,
pos.getY(i)*2+80,
pos.getZ(i)*2-200
)

}

const geo=new THREE.BufferGeometry()

geo.setAttribute(
'position',
new THREE.Float32BufferAttribute(positions,3)
)

const mat=new THREE.PointsMaterial({
color:0xffc6ff,
size:2
})

const constellation=new THREE.Points(geo,mat)

scene.add(constellation)

})

}

createConstellation("ALE")


// CREAR PLANETAS CON TEXTURA

function createPlanet(size,distance,texture,title,text){

const geometry = new THREE.SphereGeometry(size,64,64)

const material = new THREE.MeshStandardMaterial({
map:textureLoader.load(texture),
roughness:0.8,
metalness:0.1
})

const planet = new THREE.Mesh(geometry,material)

planet.userData={
distance:distance,
angle:Math.random()*Math.PI*2,
title:title,
text:text
}

scene.add(planet)


// ATMOSFERA

const glowGeo = new THREE.SphereGeometry(size*1.05,64,64)

const glowMat = new THREE.MeshBasicMaterial({
color:0x88ccff,
transparent:true,
opacity:0.25
})

const glow = new THREE.Mesh(glowGeo,glowMat)

planet.add(glow)

return planet

}

// ESTRELLAS FUGACES

function shootingStar(){

const geo=new THREE.SphereGeometry(0.2,8,8)

const mat=new THREE.MeshBasicMaterial({color:0xffffff})

const star=new THREE.Mesh(geo,mat)

star.position.set(
(Math.random()-0.5)*300,
100,
(Math.random()-0.5)*300
)

scene.add(star)

let speed=4

function move(){

star.position.y-=speed
star.position.x+=speed

if(star.position.y<-100){

scene.remove(star)

}else{

requestAnimationFrame(move)

}

}

move()

}

setInterval(shootingStar,2500)
