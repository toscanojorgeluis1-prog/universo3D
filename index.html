<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestros Recuerdos 💖</title>

<style>
body{margin:0;overflow:hidden;background:black;}
canvas{display:block;}

#info{
position:absolute;
top:20px;
left:20px;
color:white;
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:10px;
max-width:300px;
font-family:Arial;
}

button{
margin-top:10px;
padding:6px 12px;
border:none;
background:#ff4d6d;
color:white;
border-radius:5px;
cursor:pointer;
}
</style>
</head>
<body>

<div id="info">
<h2>Nuestros recuerdos 💫</h2>
<p>Arrastra para explorar</p>
<button onclick="resetCamera()">Volver</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.z = 20;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// 🌌 NEBULOSA (FONDO)
const nebulaTexture = new THREE.TextureLoader().load(
'https://threejs.org/examples/textures/nebula.jpg'
);
const nebulaMaterial = new THREE.MeshBasicMaterial({
map: nebulaTexture,
side: THREE.BackSide
});
const nebula = new THREE.Mesh(
new THREE.SphereGeometry(200,64,64),
nebulaMaterial
);
scene.add(nebula);

// ✨ ESTRELLAS REALISTAS
const starGeo = new THREE.BufferGeometry();
const starVertices = [];

for(let i=0;i<3000;i++){
starVertices.push(
(Math.random()-0.5)*400,
(Math.random()-0.5)*400,
(Math.random()-0.5)*400
);
}

starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices,3));

const starMaterial = new THREE.PointsMaterial({
color:0xffffff,
size:0.6,
transparent:true,
opacity:0.8
});

const stars = new THREE.Points(starGeo,starMaterial);
scene.add(stars);

// 📸 FORMATO DE TUS ARCHIVOS
const formatos=[
"JPG","PNG","JPG","PNG","PNG","JPG","PNG","JPG","JPG","JPG",
"JPG","JPG","JPG","JPG","JPG","JPG","JPG","JPG","JPG"
];

// 💖 TEXTOS
const textos=[
"Nos pusimos al día y nos amamos más",
"Mensajes que me chivean ",
"Cartas llenas de amor ",
"Dibujos que adoro ",
"Momentos solo nuestros ",
"Regalos inolvidables ",
"Nuestro primer paso ",
"Momentos de pareja que adoro",
"Besos bajo la lluvia ",
"Reímos hasta doler ",
"Mi favorita ",
"Me cambiaste la vida ",
"Nuestra unión ",
"El inicio de todo ",
"Esa noche especial ",
"Nosotros ",
"Nuestro hijo ",
"La flor que tan especial es",
"Nuestro amor eterno "
];

const loader = new THREE.TextureLoader();
const polaroids = [];

// 🖼️ CREAR POLAROIDS
for(let i=0;i<19;i++){

const texture = loader.load(`./${i+1}.${formatos[i]}`);

const material = new THREE.MeshBasicMaterial({ map: texture });

const geometry = new THREE.PlaneGeometry(3,4);
const photo = new THREE.Mesh(geometry, material);

// Distribución en círculo
const angle = (i/19)*Math.PI*2;
photo.position.set(Math.cos(angle)*15, (Math.random()-0.5)*5, Math.sin(angle)*15);

scene.add(photo);

photo.userData = { texto:textos[i] };
polaroids.push(photo);
}

// 🖱️ MOVER CON MOUSE
let mouseDown=false;

document.addEventListener("mousedown",()=>mouseDown=true);
document.addEventListener("mouseup",()=>mouseDown=false);

document.addEventListener("mousemove",(e)=>{
if(mouseDown){
camera.position.x -= e.movementX*0.02;
camera.position.y += e.movementY*0.02;
}
});

// 🎯 CLICK EN POLAROID
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

document.addEventListener("click",(event)=>{
mouse.x = (event.clientX/window.innerWidth)*2 -1;
mouse.y = -(event.clientY/window.innerHeight)*2 +1;

raycaster.setFromCamera(mouse,camera);
const intersects = raycaster.intersectObjects(polaroids);

if(intersects.length>0){
const obj = intersects[0].object;

document.getElementById("info").innerHTML = `
<h2>${obj.userData.texto}</h2>
<button onclick="resetCamera()">Volver</button>
`;

camera.position.set(
obj.position.x,
obj.position.y,
obj.position.z + 5
);
}
});

// 🔄 RESET
function resetCamera(){
camera.position.set(0,0,20);
document.getElementById("info").innerHTML = `
<h2>Nuestros recuerdos 💫</h2>
<p>Arrastra para explorar</p>
<button onclick="resetCamera()">Volver</button>
`;
}

// 🎥 ANIMACIÓN
function animate(){
requestAnimationFrame(animate);

// rotación suave
stars.rotation.y += 0.0005;

renderer.render(scene,camera);
}

animate();

// RESPONSIVE
window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
