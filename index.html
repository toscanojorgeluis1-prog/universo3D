<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Nuestro Universo</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#panel{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.9);
color:white;
padding:25px;
border-radius:15px;
display:none;
max-width:420px;
text-align:center;
}

#title{
font-size:22px;
margin-bottom:10px;
}

#homeBtn{
position:absolute;
top:20px;
left:20px;
padding:10px 16px;
background:rgba(0,0,0,0.8);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:14px;
display:none;
}

#homeBtn:hover{
background:rgba(255,255,255,0.2);
}

</style>
</head>

<body>

<button id="homeBtn">Volver al centro</button>

<div id="panel">
<h2 id="title"></h2>
<p id="text"></p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
10000
)

const renderer = new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setPixelRatio(window.devicePixelRatio)

document.body.appendChild(renderer.domElement)

camera.position.set(0,10,30)

const homePosition = {x:0,y:10,z:30}


// LUCES

const light=new THREE.PointLight(0xffffff,2)
scene.add(light)

const ambient=new THREE.AmbientLight(0x888888)
scene.add(ambient)


// SOL

const sunGeo=new THREE.SphereGeometry(4,64,64)
const sunMat=new THREE.MeshBasicMaterial({color:0xffcc66})
const sun=new THREE.Mesh(sunGeo,sunMat)

scene.add(sun)


// ESTRELLAS

const starGeometry = new THREE.BufferGeometry()
const starVertices = []

for(let i=0;i<40000;i++){

let x=(Math.random()-0.5)*2000
let y=(Math.random()-0.5)*2000
let z=(Math.random()-0.5)*2000

starVertices.push(x,y,z)

}

starGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(starVertices,3)
)

const starMaterial=new THREE.PointsMaterial({
color:0xffffff,
size:0.7,
transparent:true,
opacity:0.8
})

const stars=new THREE.Points(starGeometry,starMaterial)
scene.add(stars)


// CONSTELACION

function createConstellation(name){

const loader = new THREE.FontLoader()

loader.load("https://threejs.org/examples/fonts/helvetiker_regular.typeface.json", function(font){

const textGeometry = new THREE.TextGeometry(name,{
font:font,
size:8,
height:0.1
})

textGeometry.center()

const positions=[]
const pos=textGeometry.attributes.position

for(let i=0;i<pos.count;i++){

positions.push(
pos.getX(i)*2,
pos.getY(i)*2 + 80,
pos.getZ(i)*2 - 200
)

}

const geo=new THREE.BufferGeometry()

geo.setAttribute(
'position',
new THREE.Float32BufferAttribute(positions,3)
)

const mat=new THREE.PointsMaterial({
color:0xffc6ff,
size:2
})

const constellation=new THREE.Points(geo,mat)

scene.add(constellation)

})

}

createConstellation("ALE")


// PLANETAS

function createPlanet(size,distance,color,title,text){

const geo=new THREE.SphereGeometry(size,64,64)

const mat=new THREE.MeshStandardMaterial({
color:color,
emissive:color,
emissiveIntensity:0.2
})

const planet=new THREE.Mesh(geo,mat)

planet.userData={
distance:distance,
angle:Math.random()*Math.PI*2,
title:title,
text:text
}

scene.add(planet)

return planet

}

const kiss=createPlanet(
1.4,
8,
0xff4d6d,
"Nuestro primer beso",
"El momento donde comenzó nuestro pequeño universo."
)

const park=createPlanet(
1.5,
13,
0x4dabf7,
"Citas en el parque",
"Los momentos tranquilos contigo siempre se quedan en mi corazón."
)

const fights=createPlanet(
1.3,
18,
0xff6b6b,
"Nuestras peleas",
"Aunque discutimos, siempre encontramos la forma de volver a amarnos."
)

const jokes=createPlanet(
1.4,
23,
0x9d4edd,
"Nuestras bromas",
"Las risas contigo son de mis cosas favoritas."
)

const love=createPlanet(
2,
30,
0x38d9a9,
"Nuestro amor",
"A pesar de todo, siempre seguimos eligiéndonos."
)

const planets=[kiss,park,fights,jokes,love]


// ANILLO

const ringGeo=new THREE.RingGeometry(2.8,4,64)
const ringMat=new THREE.MeshBasicMaterial({
color:0xaaaaaa,
side:THREE.DoubleSide
})

const ring=new THREE.Mesh(ringGeo,ringMat)
ring.rotation.x=Math.PI/2
love.add(ring)


// CONTROL MOUSE

let mouseX=0
let mouseY=0

document.addEventListener("mousemove",(event)=>{

mouseX=(event.clientX-window.innerWidth/2)/200
mouseY=(event.clientY-window.innerHeight/2)/200

})


// ANIMACION

function animate(){

requestAnimationFrame(animate)

camera.position.x += (mouseX - camera.position.x)*0.02
camera.position.y += (-mouseY - camera.position.y)*0.02

planets.forEach(p=>{

p.userData.angle+=0.002

p.position.x=Math.cos(p.userData.angle)*p.userData.distance
p.position.z=Math.sin(p.userData.angle)*p.userData.distance

})

renderer.render(scene,camera)

}

animate()


// CLICK PLANETAS

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

window.addEventListener("click",event=>{

mouse.x=(event.clientX/window.innerWidth)*2-1
mouse.y=-(event.clientY/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const intersects=raycaster.intersectObjects(planets)

if(intersects.length>0){

let p=intersects[0].object

document.getElementById("panel").style.display="block"
document.getElementById("homeBtn").style.display="block"

document.getElementById("title").innerText=p.userData.title
document.getElementById("text").innerText=p.userData.text

camera.position.set(
p.position.x*1.6,
p.position.y+3,
p.position.z*1.6
)

}

})


// BOTON REGRESAR

document.getElementById("homeBtn").onclick=function(){

camera.position.set(
homePosition.x,
homePosition.y,
homePosition.z
)

document.getElementById("panel").style.display="none"
document.getElementById("homeBtn").style.display="none"

}

</script>
</body>
</html>
