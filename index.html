<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
2000
)

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setPixelRatio(window.devicePixelRatio)
document.body.appendChild(renderer.domElement)

camera.position.set(0,10,35)

let targetPlanet=null

const homePosition = new THREE.Vector3(0,10,35)


// LUCES MUCHO MÁS FUERTES

const sunLight = new THREE.PointLight(0xffffff,4)
sunLight.position.set(0,30,20)
scene.add(sunLight)

const ambient = new THREE.AmbientLight(0xffffff,1)
scene.add(ambient)


// ESTRELLAS

const starGeometry = new THREE.BufferGeometry()
const starVertices=[]

for(let i=0;i<40000;i++){

starVertices.push(
(Math.random()-0.5)*2000,
(Math.random()-0.5)*2000,
(Math.random()-0.5)*2000
)

}

starGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(starVertices,3)
)

const starMaterial = new THREE.PointsMaterial({
color:0xffffff,
size:0.9
})

const stars = new THREE.Points(starGeometry,starMaterial)
scene.add(stars)


// CREAR PLANETA (con color base)

function createPlanet(size,distance,color,title,text){

const geometry = new THREE.SphereGeometry(size,64,64)

const material = new THREE.MeshPhongMaterial({
color:color
})

const planet = new THREE.Mesh(geometry,material)

planet.userData={
distance:distance,
angle:Math.random()*Math.PI*2,
title:title,
text:text
}

scene.add(planet)


// ATMOSFERA

const glowGeo = new THREE.SphereGeometry(size*1.05,64,64)

const glowMat = new THREE.MeshBasicMaterial({
color:0x88ccff,
transparent:true,
opacity:0.25
})

const glow = new THREE.Mesh(glowGeo,glowMat)

planet.add(glow)

return planet

}
