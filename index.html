<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Universo Tide Eye - Planetas Artísticos</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family: Arial, sans-serif;}
#panel { position:absolute; bottom:30px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:white; padding:20px; border-radius:15px; display:none; max-width:420px; text-align:center;}
#homeBtn { position:absolute; top:20px; left:20px; padding:10px 15px; background:rgba(0,0,0,0.8); color:white; border:none; border-radius:10px; cursor:pointer; display:none;}
</style>
</head>
<body>

<button id="homeBtn">Volver al inicio</button>
<div id="panel">
  <h2 id="title"></h2>
  <p id="text"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ===== ESCENA, CÁMARA Y RENDER =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 4000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
camera.position.set(0,30,70);
const homePosition = camera.position.clone();
let targetPlanet = null;

// ===== LUCES =====
const sunLight = new THREE.PointLight(0xfff0aa, 3);
sunLight.position.set(0,80,50);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0xffffff, 0.3));

// ===== ESTRELLAS =====
const starGeo = new THREE.BufferGeometry();
const starVertices = [];
for(let i=0;i<20000;i++){
  starVertices.push((Math.random()-0.5)*4000, (Math.random()-0.5)*4000, (Math.random()-0.5)*4000);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices,3));
const starMaterial = new THREE.PointsMaterial({color:0xaaaaaa, size:1.5, transparent:true, opacity:0.7});
scene.add(new THREE.Points(starGeo, starMaterial));

// ===== SHADER PLANETA =====
const vertexShader = `
varying vec2 vUv;
varying vec3 vNormal;
void main() {
  vUv = uv;
  vNormal = normalize(normalMatrix * normal);
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
}
`;

const fragmentShader = `
// Simplex noise 3D
vec3 mod289(vec3 x){return x - floor(x * (1.0/289.0))*289.0;}
vec4 mod289(vec4 x){return x - floor(x * (1.0/289.0))*289.0;}
vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
float snoise(vec3 v){
  const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
  const vec4  D = vec4(0.0,0.5,1.0,2.0);
  vec3 i  = floor(v + dot(v, C.yyy));
  vec3 x0 = v - i + dot(i, C.xxx);
  vec3 g = step(x0.yzx,x0.xyz);
  vec3 l = 1.0 - g;
  vec3 i1 = min( g.xyz, l.zxy );
  vec3 i2 = max( g.xyz, l.zxy );
  vec3 x1 = x0 - i1 + C.xxx;
  vec3 x2 = x0 - i2 + C.yyy;
  vec3 x3 = x0 - D.yyy;
  i = mod289(i);
  vec4 p = permute( permute( permute(
            i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
          + i.y + vec4(0.0, i1.y, i2.y, 1.0 ))
          + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
  float n_ = 0.142857142857;
  vec3  ns = n_ * D.wyz - D.xzx;
  vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
  vec4 x_ = floor(j * ns.z);
  vec4 y_ = floor(j - 7.0 * x_);
  vec4 x = x_ *ns.x + ns.y;
  vec4 y = y_ *ns.x + ns.y;
  vec4 h = 1.0 - abs(x) - abs(y);
  vec4 b0 = vec4( x.xy, y.xy );
  vec4 b1 = vec4( x.zw, y.zw );
  vec4 s0 = floor(b0)*2.0 +1.0;
  vec4 s1 = floor(b1)*2.0 +1.0;
  vec4 sh = -step(h, vec4(0.0));
  vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
  vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
  vec3 p0 = vec3(a0.xy,h.x);
  vec3 p1 = vec3(a0.zw,h.y);
  vec3 p2 = vec3(a1.xy,h.z);
  vec3 p3 = vec3(a1.zw,h.w);
  vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
  p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
  vec4 m = max(0.6 - vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);
  m = m*m;
  m = m*m;
  vec4 px = vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3));
  return dot(m,px)*70.0;
}

uniform float time;
uniform vec3 color1;
uniform vec3 color2;
varying vec2 vUv;
varying vec3 vNormal;

void main(){
  float n = snoise(vNormal*3.0 + time*0.2);
  vec3 col = mix(color1, color2, n*0.5 + 0.5);
  float lighting = dot(normalize(vNormal), vec3(0.5,0.8,0.3))*0.5 +0.5;
  gl_FragColor = vec4(col * lighting,1.0);
}
`;

// ===== FUNCION CREAR PLANETA SHADER =====
function createShaderPlanet(size, distance, color1, color2, title, text, options={}){
  const mat = new THREE.ShaderMaterial({
    vertexShader,
    fragmentShader,
    uniforms:{
      time: {value:0},
      color1:{value:new THREE.Color(color1)},
      color2:{value:new THREE.Color(color2)}
    }
  });
  const geo = new THREE.SphereGeometry(size,64,64);
  const planet = new THREE.Mesh(geo, mat);
  planet.userData = { distance, angle:Math.random()*Math.PI*2, title, text, material:mat };
  scene.add(planet);

  if(options.ring){
    const ringGeo = new THREE.RingGeometry(size*1.2, size*2, 64);
    const ringMat = new THREE.MeshBasicMaterial({ color:0x8888aa, side:THREE.DoubleSide, transparent:true, opacity:0.5 });
    const ringMesh = new THREE.Mesh(ringGeo, ringMat);
    ringMesh.rotation.x = -0.5*Math.PI;
    planet.add(ringMesh);
  }

  return planet;
}

// ===== PLANETAS SHADER =====
const planets = [
  createShaderPlanet(1.6,10,'#0f3a5d','#1f6a8c',"Nuestro primer beso","El momento donde empezó nuestro universo."),
  createShaderPlanet(1.8,16,'#3a1f5d','#6a1f8c',"Citas en el parque","Las tardes contigo en el parque siempre son especiales."),
  createShaderPlanet(1.5,22,'#1f5d3a','#3fa68c',"Tus bromas apestosas","Aunque a veces son terribles, siempre terminan haciéndome reír."),
  createShaderPlanet(2.0,28,'#5d0f3a','#8c1f6a',"Nuestras llamadas","Cada llamada contigo me recuerda cuánto significas para mí."),
  createShaderPlanet(1.7,34,'#0f5d5d','#1fa6a6',"Nuestras historias","Cada historia contigo es una página más de nuestra aventura."),
  createShaderPlanet(2.3,40,'#1f1f5d','#3f3fa6',"Nosotros","Tú y yo, siendo nosotros mismos."),
  createShaderPlanet(2.5,46,'#5d5d0f','#a6a61f',"El amor más fuerte que el mundo","Nuestro amor siempre encuentra la forma de seguir brillando.",{ring:true})
];

// ===== RAYCASTER =====
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
window.addEventListener("click",(event)=>{
  mouse.x = (event.clientX/window.innerWidth)*2-1;
  mouse.y = -(event.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const intersects = raycaster.intersectObjects(planets);
  if(intersects.length>0){
    targetPlanet = intersects[0].object;
    document.getElementById("panel").style.display="block";
    document.getElementById("homeBtn").style.display="block";
    document.getElementById("title").innerText = targetPlanet.userData.title;
    document.getElementById("text").innerText = targetPlanet.userData.text;
  }
});

// ===== BOTÓN VOLVER =====
document.getElementById("homeBtn").onclick = ()=>{
  targetPlanet=null;
  camera.position.copy(homePosition);
  document.getElementById("panel").style.display="none";
  document.getElementById("homeBtn").style.display="none";
};

// ===== ANIMACIÓN =====
function animate(){
  requestAnimationFrame(animate);
  const t = Date.now()*0.001;
  planets.forEach(p=>{
    p.userData.angle += 0.0015 + Math.random()*0.0005;
    p.position.x = Math.cos(p.userData.angle)*p.userData.distance;
    p.position.z = Math.sin(p.userData.angle)*p.userData.distance;
    p.rotation.y += 0.003 + Math.random()*0.001;
    p.userData.material.uniforms.time.value = t;
  });
  if(targetPlanet){
    const pos = new THREE.Vector3(targetPlanet.position.x+6,targetPlanet.position.y+3,targetPlanet.position.z+6);
    camera.position.lerp(pos,0.05);
    camera.lookAt(targetPlanet.position);
  }
  renderer.render(scene,camera);
}

// ===== AJUSTE VENTANA =====
window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

animate();
</script>
</body>
</html>
